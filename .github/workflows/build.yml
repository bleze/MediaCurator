name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# install-qt-action and msvc-dev-cmd don't have Node.js 24 builds yet; allow
# them to fall back to Node 20 until their maintainers publish Node 24 versions.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (MSVC x64)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Verify Qt paths
      run: |
        echo "Qt6_DIR  = $env:Qt6_DIR"
        echo "QT_ROOT  = $env:QT_ROOT_DIR"

    - name: Set up MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Exclude build directories from Windows Defender
      run: |
        Add-MpPreference -ExclusionPath "${{ github.workspace }}\build"
        Add-MpPreference -ExclusionPath "${{ github.workspace }}\.ccache"

    - name: Install ccache
      run: choco install ccache -y --no-progress

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-windows-${{ github.sha }}
        restore-keys: ccache-windows-

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: powershell -ExecutionPolicy Bypass -File scripts/setup_tools.ps1

    - name: Cache Chocolatey NSIS package
      uses: actions/cache@v4
      with:
        path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
        key: choco-nsis

    - name: Install NSIS
      run: |
        choco install nsis -y --no-progress
        echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Package (NSIS installer)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-Windows-Installer
        path: build/packages/MediaCurator-*.exe
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    name: macOS (Clang universal)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        # 6.8.3 still unconditionally links QtGui against AGL.framework, which
        # macOS 26 (Tahoe)'s SDK no longer ships — fixed in 6.8.4.
        version: '6.8.4'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        cache: true

    - name: Install ccache
      run: brew install ccache

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-macos-${{ github.sha }}
        restore-keys: ccache-macos-

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Clear quarantine attributes
      run: xattr -rc build/ || true

    - name: Package (DMG)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-macOS-DMG
        path: build/packages/MediaCurator-*.dmg
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    name: Linux (GCC x64)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          ccache \
          ninja-build \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-shape0-dev \
          libxcb-shm0-dev \
          libxcb-sync-dev \
          libxcb-xfixes0-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-linux-${{ github.sha }}
        restore-keys: ccache-linux-

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Package (DEB)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-Linux-DEB
        path: build/packages/MediaCurator-*.deb
        if-no-files-found: error
