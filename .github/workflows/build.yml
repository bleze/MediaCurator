name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Opt into Node.js 24 for all actions (required before June 16 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (MSVC x64)

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Verify Qt paths
      run: |
        echo "Qt6_DIR  = $env:Qt6_DIR"
        echo "QT_ROOT  = $env:QT_ROOT_DIR"

    - name: Set up MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: powershell -ExecutionPolicy Bypass -File scripts/setup_tools.ps1

    - name: Install NSIS
      run: |
        choco install nsis -y --no-progress
        echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Package (NSIS installer)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: MediaCurator-Windows-Installer
        path: build/packages/MediaCurator-*.exe
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    name: macOS (Clang universal)

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        cache: true

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Clear quarantine attributes
      run: xattr -rc build/ || true

    - name: Package (DMG)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: MediaCurator-macOS-DMG
        path: build/packages/MediaCurator-*.dmg
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    name: Linux (GCC x64)

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          ninja-build \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-shape0-dev \
          libxcb-shm0-dev \
          libxcb-sync-dev \
          libxcb-xfixes0-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Package (DEB)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: MediaCurator-Linux-DEB
        path: build/packages/MediaCurator-*.deb
        if-no-files-found: error
