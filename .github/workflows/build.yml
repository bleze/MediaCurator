name: Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# install-qt-action and msvc-dev-cmd don't have Node.js 24 builds yet; allow
# them to fall back to Node 20 until their maintainers publish Node 24 versions.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (MSVC x64)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Must run before "Configure CMake" — the install() rules for tools/windows/
    # in both cmake/Packaging.cmake and src/CMakeLists.txt are gated on the
    # files already existing at configure time.
    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: powershell -ExecutionPolicy Bypass -File scripts/setup_tools.ps1

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Verify Qt paths
      run: |
        echo "Qt6_DIR  = $env:Qt6_DIR"
        echo "QT_ROOT  = $env:QT_ROOT_DIR"

    - name: Set up MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Exclude build directories from Windows Defender
      run: |
        Add-MpPreference -ExclusionPath "${{ github.workspace }}\build"
        Add-MpPreference -ExclusionPath "${{ github.workspace }}\.ccache"

    - name: Install ccache
      run: choco install ccache -y --no-progress

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-windows-${{ github.sha }}
        restore-keys: ccache-windows-

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Cache Chocolatey NSIS package
      uses: actions/cache@v4
      with:
        path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
        key: choco-nsis

    - name: Install NSIS
      run: |
        choco install nsis -y --no-progress
        echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Package (NSIS installer)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-Windows-Installer
        path: build/packages/MediaCurator-*.exe
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    name: macOS (Clang universal)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Must run before "Configure CMake" — src/CMakeLists.txt's install() rule
    # for tools/ (DESTINATION MediaCurator.app/Contents/MacOS/tools) is gated
    # on the files already existing at configure time.
    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        # 6.8.3 still unconditionally links QtGui against AGL.framework, which
        # macOS 26 (Tahoe)'s SDK no longer ships — fixed in 6.8.4, but that's an
        # LTS patch release only published to Qt's commercial repo. aqtinstall
        # (open-source) tops out at 6.8.3 for the 6.8 branch, so use 6.9.2+
        # instead, which carries the same fix and is publicly available.
        version: '6.9.2'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        cache: true

    - name: Install ccache
      run: brew install ccache

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-macos-${{ github.sha }}
        restore-keys: ccache-macos-

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --parallel

    - name: Clear quarantine attributes
      run: xattr -rc build/ || true

    - name: Package (DMG)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-macOS-DMG
        path: build/packages/MediaCurator-*.dmg
        if-no-files-found: error

  build-linux:
    # Pinned to 22.04 (glibc 2.35), not ubuntu-latest: linuxdeployqt refuses to
    # bundle libraries built on a newer glibc than Jammy's, since binaries
    # compiled there can end up requiring glibc symbol versions that don't
    # exist on older still-supported target distros. Building on the older
    # baseline keeps the bundled Qt libs (and MediaCurator itself) compatible
    # with a wider range of target systems.
    runs-on: ubuntu-22.04
    name: Linux (GCC x64)
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          ccache \
          ninja-build \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-shape0-dev \
          libxcb-shm0-dev \
          libxcb-sync-dev \
          libxcb-xfixes0-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev

    # Must run before "Configure CMake" — src/CMakeLists.txt's install() rule
    # for tools/ (DESTINATION lib/MediaCurator/tools) is gated on the files
    # already existing at configure time. (Needs apt-get update from the step
    # above for the mkvtoolnix install.)
    - name: Download bundled tools (ffprobe + mkvtoolnix)
      run: bash scripts/setup_tools.sh

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-linux-${{ github.sha }}
        restore-keys: ccache-linux-

    # linuxdeployqt bundles Qt's .so files + plugins into the .deb (see
    # src/CMakeLists.txt) so the package doesn't depend on the target
    # machine's distro Qt6 version. Ships as an AppImage; extract it up front
    # rather than running the AppImage directly, since GitHub-hosted runners
    # don't reliably have FUSE available to mount it.
    - name: Install linuxdeployqt
      run: |
        curl -fsSL -o linuxdeployqt.AppImage \
          "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod +x linuxdeployqt.AppImage
        ./linuxdeployqt.AppImage --appimage-extract
        sudo ln -sf "$PWD/squashfs-root/AppRun" /usr/local/bin/linuxdeployqt

    - name: Configure CMake
      run: >
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
        -DQt6_DIR="${{ env.Qt6_DIR }}"
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    # DatabaseManager only ever opens QSQLITE. The other sqldrivers plugins
    # Qt ships (odbc, psql, mimer, ...) link against third-party client
    # libraries that aren't installed on this runner or on end-user machines.
    # linuxdeployqt tries to bundle every plugin it finds and aborts if ldd
    # can't resolve any of their dependencies, even for drivers we never
    # load, so strip the unused ones before it runs. Must come AFTER
    # "Configure CMake": Qt6Sql's own CMake package config declares an
    # imported target per driver plugin and errors out of find_package(Qt6)
    # if any referenced plugin file is missing, so the files have to still
    # be there at configure time.
    - name: Remove unused Qt SQL driver plugins
      run: find "${{ env.QT_PLUGIN_PATH }}/sqldrivers" -type f ! -name 'libqsqlite.so' -delete

    - name: Build
      run: cmake --build build --parallel

    - name: Package (DEB)
      run: cpack --config build/CPackConfig.cmake -C Release -B build/packages

    - name: Upload installer
      uses: actions/upload-artifact@v6
      with:
        name: MediaCurator-Linux-DEB
        path: build/packages/MediaCurator-*.deb
        if-no-files-found: error

  # Runs only on tag pushes (e.g. v1.0.0) — collects the installers built by
  # the three jobs above and publishes them as a GitHub Release. The version
  # baked into each installer comes from CMakeLists.txt's PROJECT_VERSION, so
  # the tag pushed here should match that version (see Version.h.in).
  release:
    needs: [ build-windows, build-macos, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Publish release
    permissions:
      contents: write

    steps:
    - name: Download all installers
      uses: actions/download-artifact@v6
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true
        fail_on_unmatched_files: true
